<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HEP Update</title>
<style>
body { font-family: -apple-system, sans-serif; background: #F7F5F2; color: #2C2A28; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 24px; text-align: center; }
.card { background: #fff; border-radius: 12px; padding: 32px 24px; max-width: 340px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
h1 { font-size: 20px; margin: 0 0 12px; color: #2A5A8F; }
p { font-size: 15px; color: #6B6560; line-height: 1.5; margin: 0 0 20px; }
#status { font-size: 14px; color: #2A5A8F; font-weight: 500; }
.spinner { width: 24px; height: 24px; border: 3px solid #E0DCD7; border-top-color: #2A5A8F; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.done { color: #2B8C3E; }
</style>
</head>
<body>
<div class="card">
<h1>HEP Update</h1>
<div class="spinner" id="spinner"></div>
<p id="status">Clearing cache and updating...</p>
</div>
<script>
(async function() {
  const status = document.getElementById('status');
  const spinner = document.getElementById('spinner');
  try {
    // Unregister all service workers
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) { await r.unregister(); }
      status.textContent = 'Service workers cleared...';
    }
    // Delete all caches
    const keys = await caches.keys();
    for (const k of keys) { await caches.delete(k); }
    status.textContent = 'Caches cleared. Redirecting...';
    spinner.style.display = 'none';
    // Redirect to app after brief pause
    setTimeout(function() {
      window.location.href = './index.html?t=' + Date.now();
    }, 1000);
  } catch(e) {
    spinner.style.display = 'none';
    status.innerHTML = 'Error: ' + e.message + '<br><br><a href="./index.html" style="color:#2A5A8F;">Go to app</a>';
  }
})();
</script>
</body>
</html>
